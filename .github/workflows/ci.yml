name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .[dev]
    
    - name: Test imports
      run: |
        python -c "import mcp.types; print('MCP imported')"
        python -c "
        try:
            import pdg
            print('PDG imported')
        except ImportError:
            print('PDG not available (expected in CI)')
        "
    
    - name: Run comprehensive tests
      run: |
        python test_modular.py
    
    - name: Test server module import
      run: |
        python -c "import pp_mcp_server; print('Server module imported')"
    
    - name: Validate configuration
      run: |
        python -c "
        try:
            from modules.config import config
            print(f'Configuration loaded: {config.environment}')
        except ImportError:
            print('Configuration module not available yet')
        "

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check code formatting with black
      run: |
        black --check --diff .
    
    - name: Check import sorting with isort
      run: |
        isort --check-only --diff .
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics 
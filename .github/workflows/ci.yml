name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test imports
      run: |
        python -c "import mcp.types; print('✓ MCP imported')"
        python -c "import pdg; print('✓ PDG imported')"
    
    - name: Run tests
      run: |
        python test_pdg_server.py
    
    - name: Test CLI
      run: |
        python pdg_cli.py --help
        python pdg_cli.py search --query "e-" || true  # Allow failure for API issues
    
    - name: Test examples
      run: |
        python examples.py || true  # Allow failure for API connectivity

  docker:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t pdg-mcp-server:test .
    
    - name: Test Docker image
      run: |
        docker run --rm pdg-mcp-server:test python -c "import mcp.types; import pdg; print('✓ Docker image working')"
    
    - name: Test CLI in Docker
      run: |
        docker run --rm -v "$(pwd)/pdg_cli.py:/app/pdg_cli.py" pdg-mcp-server:test python pdg_cli.py --help

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
    
    - name: Check code formatting with black
      run: |
        black --check --diff .
    
    - name: Check import sorting with isort
      run: |
        isort --check-only --diff .
    
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics 
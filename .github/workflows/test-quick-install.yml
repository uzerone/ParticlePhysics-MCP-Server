name: Test Quick Install

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'mcp-*.json'
      - '.github/workflows/test-quick-install.yml'
      - 'README.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-quick-install:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv pipx
    
    - name: Test JSON configurations
      run: |
        python -c "
        import json
        configs = ['mcp-server.json']
        for config in configs:
            try:
                with open(config) as f:
                    data = json.load(f)
                print(f'PASS {config} is valid JSON')
                # Basic validation for MCP server config
                if 'mcpServers' in data:
                    for server_name, server_config in data['mcpServers'].items():
                        if 'command' in server_config and 'args' in server_config:
                            print(f'PASS {config}: {server_name} has valid MCP structure')
                        else:
                            print(f'WARN {config}: {server_name} missing command or args')
            except Exception as e:
                print(f'FAIL {config} failed: {e}')
                exit(1)
        "
    
    - name: Test uvx installation (Unix)
      if: runner.os != 'Windows'
      run: |
        timeout 30s uv tool run --from git+https://github.com/uzerone/ParticlePhysics-MCP-Server.git pp-mcp-server --help || echo "Expected to timeout/fail without PDG in CI"
    
    - name: Test uvx installation (Windows)
      if: runner.os == 'Windows'
      run: |
        # Windows timeout command
        uv tool run --from git+https://github.com/uzerone/ParticlePhysics-MCP-Server.git pp-mcp-server --help || echo "Expected to fail without PDG in CI"
    
    - name: Test package installation
      run: |
        # Test that the package can be installed
        pip install -e .
        python -c "import pp_mcp_server; print('PASS Package imports successfully')"
    
    - name: Test MCP server basic functionality
      run: |
        python -c "
        try:
            import pp_mcp_server
            print('PASS MCP server module imports successfully')
            # Test that main components exist
            if hasattr(pp_mcp_server, 'run_server'):
                print('PASS run_server function exists')
            else:
                print('WARN run_server function not found')
        except ImportError as e:
            print(f'FAIL Failed to import pp_mcp_server: {e}')
            exit(1)
        "

  test-package-metadata:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: |
        python -m build
    
    - name: Check package
      run: |
        twine check dist/*
    
    - name: Test package installation from wheel
      run: |
        pip install dist/*.whl
        python -c "import pp_mcp_server; print('PASS Package installed successfully from wheel')"

  test-json-configs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate JSON configuration
      run: |
        python -c "
        import json
        import os
        
        config_file = 'mcp-server.json'
        
        if os.path.exists(config_file):
            try:
                with open(config_file, 'r') as f:
                    data = json.load(f)
                print(f'PASS {config_file}: Valid JSON')
                
                # Validate MCP server structure
                assert 'mcpServers' in data, 'Missing mcpServers key'
                assert 'particlephysics' in data['mcpServers'], 'Missing particlephysics server'
                server = data['mcpServers']['particlephysics']
                assert 'command' in server, 'Missing command'
                assert 'args' in server, 'Missing args'
                assert server['command'] == 'uv', 'Expected uv command'
                print(f'PASS {config_file}: Valid MCP structure')
                
            except Exception as e:
                print(f'FAIL {config_file}: {e}')
                exit(1)
        else:
            print(f'FAIL {config_file}: File not found')
            exit(1)
        " 
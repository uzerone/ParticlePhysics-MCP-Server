services:
  pdg-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdg-mcp-server:latest
    container_name: pdg-mcp-server
    restart: unless-stopped
    
    # Environment variables
    environment:
      - PYTHONUNBUFFERED=1
      - PDG_LOG_LEVEL=INFO
    
    # Volume mounts for persistence and development
    volumes:
      # Persist PDG data between container restarts
      - pdg_data:/app/data
    
    # Network configuration
    networks:
      - pdg-network
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import pdg; pdg.connect()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Default command (can be overridden)
    command: ["python", "pdg_mcp_server.py"]

  # Optional: PDG MCP Server for testing
  pdg-mcp-test:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdg-mcp-server:latest
    container_name: pdg-mcp-test
    profiles:
      - testing
    
    environment:
      - PYTHONUNBUFFERED=1
    
    volumes:
      - pdg_data:/app/data
    
    networks:
      - pdg-network
    
    command: ["python", "test_modular.py"]

  # Optional: PDG MCP Server for examples
  pdg-mcp-examples:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdg-mcp-server:latest
    container_name: pdg-mcp-examples
    profiles:
      - examples
    
    environment:
      - PYTHONUNBUFFERED=1
    
    volumes:
      - pdg_data:/app/data
    
    networks:
      - pdg-network
    
    # Interactive mode for examples
    stdin_open: true
    tty: true
    
    command: ["python", "examples.py"]

# Named volumes for data persistence
volumes:
  pdg_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./pdg_data

# Custom network
networks:
  pdg-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 